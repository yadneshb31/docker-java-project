<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/></head>
<body class="bg-light">
<div class="container" style="max-width:420px;margin-top:8rem">
  <div class="card shadow-sm"><div class="card-body">
    <h3 class="mb-3 text-center">Sign in</h3>
    <div th:if="${param.error}" class="alert alert-danger">Invalid credentials</div>
    <div th:if="${param.logout}" class="alert alert-success">Logged out</div>
    <form th:action="@{/login}" method="post">
      <div class="mb-3"><label class="form-label">Username</label>
        <input class="form-control" name="username" required/></div>
      <div class="mb-3"><label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" required/></div>
      <button class="btn btn-primary w-100" type="submit">Login</button>
    </form>
    <p class="text-muted small mt-3 text-center">Default: admin / admin123</p>
  </div></div>
</div></body></html>
