<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<body><div th:fragment="content">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Students</h2>
    <a class="btn btn-success" th:href="@{/students/new}">+ Add Student</a>
  </div>
  <form class="row g-2 mb-3" method="get" th:action="@{/students}">
    <div class="col-auto"><input class="form-control" name="q" th:value="${q}" placeholder="Search..."/></div>
    <div class="col-auto"><button class="btn btn-primary">Search</button></div>
  </form>
  <table class="table table-bordered table-hover">
    <thead class="table-light"><tr>
      <th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Course</th><th>DOB</th><th>Actions</th>
    </tr></thead>
    <tbody>
      <tr th:each="s : ${page.content}">
        <td th:text="${s.id}"></td>
        <td th:text="${s.firstName + ' ' + s.lastName}"></td>
        <td th:text="${s.email}"></td>
        <td th:text="${s.phoneNumber}"></td>
        <td th:text="${s.course}"></td>
        <td th:text="${s.dateOfBirth}"></td>
        <td>
          <a class="btn btn-sm btn-warning" th:href="@{'/students/' + ${s.id} + '/edit'}">Edit</a>
          <form th:action="@{'/students/' + ${s.id} + '/delete'}" method="post" class="d-inline"
                onsubmit="return confirm('Delete?')">
            <button class="btn btn-sm btn-danger">Delete</button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
  <nav th:if="${page.totalPages > 1}">
    <ul class="pagination">
      <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
          th:classappend="${i == page.number} ? 'active'">
        <a class="page-link" th:href="@{/students(page=${i},size=${page.size},q=${q})}" th:text="${i+1}"></a>
      </li>
    </ul>
  </nav>
</div></body></html>
